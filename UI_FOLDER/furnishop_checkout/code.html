<div>

</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium mb-2" for="state">State</label>
<input class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-subtle-light dark:bg-subtle-dark focus:ring-primary focus:border-primary" id="state" placeholder="CA" type="text"/>
</div>
<div>
<label class="block text-sm font-medium mb-2" for="zip-code">Zip code</label>
<input class="form-input w-full rounded-lg border-border-light dark:border-border-dark bg-subtle-light dark:bg-subtle-dark focus:ring-primary focus:border-primary" id="zip-code" placeholder="91234" type="text"/>

</div>

<input checked="" class="form-radio h-5 w-5 border-2 border-border-light dark:border-border-dark bg-transparent text-primary focus:ring-primary focus:ring-offset-0" name="payment-method" type="radio"/>
<span class="text-sm font-medium">Credit card</span>

<label class="flex items-center gap-4 p-4 rounded-lg border border-border-light dark:border-border-dark has-[:checked]:border-primary has-[:checked]:ring-2 has-[:checked]:ring-primary/50 cursor-pointer transition-all">
