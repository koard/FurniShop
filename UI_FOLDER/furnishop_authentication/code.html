<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FurniShop - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1791cf",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111c21",
                        "content-light": "#0e171b",
                        "content-dark": "#ffffff",
                        "subtle-light": "#4e7f97",
                        "subtle-dark": "#a0b8c4",
                        "border-light": "#d0dfe7",
                        "border-dark": "#2a3f4a"
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-content-light dark:text-content-dark">
<div class="flex flex-col min-h-screen">
<header class="border-b border-border-light dark:border-border-dark">
<nav class="container mx-auto px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<svg class="h-8 w-8 text-primary" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"></path>
</svg>
<h1 class="text-xl font-bold">FurniShop</h1>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Products</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">About Us</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Contact</a>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-primary/10 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">
                            search
                        </span>
</button>
<a class="px-4 py-2 rounded-md text-sm font-medium text-white bg-primary hover:bg-primary/90 transition-colors" href="#">Sign In</a>
<button class="md:hidden p-2 rounded-full hover:bg-primary/10 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">
                            menu
                        </span>
</button>
</div>
</nav>
</header>
<main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-md space-y-8">
<div>
<h2 class="mt-6 text-center text-3xl font-extrabold">
                        Sign in to your account
                    </h2>
</div>
<form action="#" class="mt-8 space-y-6" method="POST">
<input name="remember" type="hidden" value="true"/>
<div class="rounded-md shadow-sm -space-y-px">
<div>
<label class="sr-only" for="email-address">Email address</label>
<input autocomplete="email" class="appearance-none rounded-none relative block w-full px-3 py-4 border border-border-light dark:border-border-dark placeholder-subtle-light dark:placeholder-subtle-dark bg-background-light dark:bg-background-dark focus:outline-none focus:ring-primary focus:border-primary focus:z-10 text-sm rounded-t" id="email-address" name="email" placeholder="Email address" required="" type="email"/>
</div>
<div>
<label class="sr-only" for="password">Password</label>
<input autocomplete="current-password" class="appearance-none rounded-none relative block w-full px-3 py-4 border border-border-light dark:border-border-dark placeholder-subtle-light dark:placeholder-subtle-dark bg-background-light dark:bg-background-dark focus:outline-none focus:ring-primary focus:border-primary focus:z-10 text-sm rounded-b" id="password" name="password" placeholder="Password" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-border-light dark:border-border-dark rounded bg-background-light dark:bg-background-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-subtle-light dark:text-subtle-dark" for="remember-me">
                                Remember me
                            </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary/80" href="#">
                                Forgot your password?
                            </a>
</div>
</div>
<div class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded" role="alert">
<p class="font-bold">Error</p>
<p>Invalid email or password. Please try again.</p>
</div>
<div>
<button class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                            Sign in
                        </button>
</div>
</form>
<div class="text-center text-sm text-subtle-light dark:text-subtle-dark">
<p>
                        Don't have an account?
                        <a class="font-medium text-primary hover:text-primary/80" href="#">
                            Sign up
                        </a>
</p>
</div>
</div>
</main>
</div>

</body></html>
